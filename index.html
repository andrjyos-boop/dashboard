<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Дашборд Оповіщення</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <style>
    * { 
      box-sizing: border-box !important; 
      margin: 0; 
      padding: 0; 
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
      width: 100% !important;
      height: 100% !important;
      overflow: hidden !important; 
      background-color: #f3f4f6; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: #1f2937;
    }

    .container { 
      width: 100% !important;
      max-width: 580px !important;
      height: 100vh !important;
      margin: 0 auto !important;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    
    .refresh-timer {
      text-align: center;
      font-size: calc(10px + 0.2vh);
      color: #6b7280;
      font-weight: 500;
      padding: 4px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .countdown-live {
      color: #3b82f6;
      font-weight: 700;
    }

    .scrollable-content {
      flex: 1;
      overflow-y: auto !important; 
      overflow-x: hidden !important; 
      padding-bottom: 20px; 
      display: flex;
      flex-direction: column;
      gap: 0.5vh;
    }
    
    .scrollable-content::-webkit-scrollbar {
      width: 4px;
    }
    .scrollable-content::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    .section-title {
      font-size: calc(11px + 0.2vh);
      font-weight: 700;
      text-transform: uppercase;
      color: #4b5563;
      letter-spacing: 0.5px;
      padding: 6px 0 2px 0;
    }

    .loader { 
      text-align: center; 
      font-size: 14px; 
      color: #4b5563; 
      padding-top: 20vh;
    }

    #main-cards {
      display: flex;
      flex-direction: column;
      gap: 0.5vh;
      width: 100% !important;
    }

    .row-item { 
      background: white; 
      padding: 0.8vh 3vw; 
      border-radius: 6px; 
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      border-left: 5px solid #3b82f6;
      display: flex;
      flex-direction: column;
      gap: 0.4vh;
      width: 100% !important;
    }
    .row-item.summary-row { border-left-color: #10b981; background: #f0fdf4; }
    .row-item.area-priority { border-left-color: #6d28d9; background: #faf5ff; }
    
    .row-title { 
      font-size: calc(11px + 0.3vh); 
      font-weight: 700; 
      color: #111827; 
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .grid { 
      display: flex; 
      gap: 1.5vw; 
      width: 100% !important;
    }
    .metric { 
      flex: 1; 
      background: #f9fafb; 
      padding: 0.4vh 1vw; 
      border-radius: 4px; 
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #e5e7eb;
      min-width: 0; 
    }
    .metric-title { 
      font-size: calc(9px + 0.1vh); 
      color: #6b7280; 
      font-weight: 600; 
      text-transform: uppercase; 
    }
    .metric-value { 
      font-size: calc(12px + 0.4vh); 
      font-weight: 800; 
      color: #111827; 
    }
    .metric.success-box { background: #d1fae5; border-color: #a7f3d0; }
    .metric.success-box .metric-value { color: #065f46; }
    
    .vlk-inline {
      font-size: calc(9px + 0.1vh);
      background: #fffbeb;
      color: #b45309;
      padding: 0.2vh 1.5vw;
      border-radius: 4px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
    }

    #spoiler-container {
      display: flex;
      flex-direction: column;
      width: 100% !important;
      margin-top: 4px;
    }
    
    .spoiler-btn {
      width: 100% !important;
      background: #4b5563;
      color: white;
      border: none;
      padding: 1vh;
      border-radius: 6px;
      font-size: calc(11px + 0.1vh);
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spoiler-content { 
      display: none; 
      flex-direction: column;
      gap: 0.5vh;
      margin-top: 4px;
      width: 100% !important;
    }
    .spoiler-content.open { 
      display: flex; 
    }

    #search-bar {
      width: 100% !important;
      padding: 6px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: calc(11px + 0.1vh);
      outline: none;
      margin-bottom: 2px;
    }
    
    #filtered-other-cards {
      display: flex;
      flex-direction: column;
      gap: 0.5vh;
      width: 100% !important;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="refresh-timer">
      <div id="refresh-clock">Синхронізація додатка...</div>
      <div id="countdown-wrapper" style="display:none;">Оновлення через: <span id="countdown" class="countdown-live">30</span> сек</div>
    </div>
    
    <div id="loader" class="loader">Завантаження пріоритетів області...</div>
    
    <div class="scrollable-content" id="scroll-box" style="display:none;">
      <div class="section-title" id="main-title">Звягельський район та Область</div>
      <div id="main-cards"></div>

      <div id="spoiler-container">
        <button class="spoiler-btn" id="toggle-btn" onclick="toggleSpoiler()">Інші підрозділи області ▾</button>
        <div id="other-cards" class="spoiler-content">
          <input type="text" id="search-bar" placeholder="Пошук (Малин, Коростень...)" onkeyup="filterCards()">
          <div id="filtered-other-cards"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const REFRESH_INTERVAL = 30000; // 30 секунд
    let timeLeft = REFRESH_INTERVAL / 1000;
    let allData = [];
    let isSpoilerOpen = false;
    let isInitialLoad = true;
    let countdownTimer = null;

    document.addEventListener("DOMContentLoaded", function() {
      fetchData();
      startCountdown();
    });

    function startCountdown() {
      if (countdownTimer) clearInterval(countdownTimer);
      
      countdownTimer = setInterval(function() {
        timeLeft--;
        const countdownEl = document.getElementById('countdown');
        if (countdownEl) {
          countdownEl.innerText = timeLeft;
        }

        if (timeLeft <= 0) {
          fetchData();
          timeLeft = REFRESH_INTERVAL / 1000; // Скидаємо лічильник назад на 30
        }
      }, 1000);
    }

    function fetchData() {
      const clockEl = document.getElementById('refresh-clock');
      if (!isInitialLoad) {
        clockEl.innerText = "Оновлення даних з Таблиці...";
      }
      google.script.run
        .withSuccessHandler(renderData)
        .withFailureHandler(showError)
        .getDataFromSheet();
    }

    function renderData(data) {
      document.getElementById("loader").style.display = "none";
      document.getElementById("countdown-wrapper").style.display = "block";
      allData = data;
      buildDashboard(data);
      
      if (isInitialLoad) {
        isInitialLoad = false;
      }
      
      const now = new Date();
      const timeStr = now.toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('refresh-clock').innerText = `Синхронізовано: ${timeStr}`;
      
      // Перезапускаємо таймер на повні 30 секунд після успішного завантаження даних
      timeLeft = REFRESH_INTERVAL / 1000;
      document.getElementById('countdown').innerText = timeLeft;
    }

    function createRowHtml(item) {
      let nameLower = item.department.toLowerCase();
      let isTotalArea = nameLower.includes("житомирський отцк") || nameLower.includes("отцк та сп");
      let isSummary = nameLower.includes("всього") || nameLower.includes("разом") || isTotalArea;
      
      let cardClass = "row-item";
      if (isTotalArea) cardClass = "row-item area-priority";
      else if (isSummary) cardClass = "row-item summary-row";
      
      let html = `<div class="${cardClass}">`;
      html += `<div class="row-title">${item.department}</div>`;
      html += `<div class="grid">`;
      html += `<div class="metric"><span class="metric-title">Перевірено</span><span class="metric-value">${item.checked}</span></div>`;
      html += `<div class="metric"><span class="metric-title">Доставлено</span><span class="metric-value">${item.delivered}</span></div>`;
      html += `<div class="metric success-box"><span class="metric-title">Призвано</span><span class="metric-value">${item.summoned}</span></div>`;
      html += `</div>`;
      
      if (item.hasVlkData && item.issues > 0) {
        html += `<div class="vlk-inline"><span>В процесі ВЛК / відстрочка:</span><span>${item.issues}</span></div>`;
      }
      html += `</div>`;
      return html;
    }

    function buildDashboard(data) {
      const mainContainer = document.getElementById("main-cards");
      const otherContainer = document.getElementById("other-cards");
      const scrollBox = document.getElementById("scroll-box");
      
      const searchInput = document.getElementById("search-bar");
      const currentQuery = searchInput ? searchInput.value : "";
      
      if(!data || data.length === 0) {
        mainContainer.innerHTML = '<div class="loader">Дані відсутні або оновлюються.</div>';
        scrollBox.style.display = "none";
        return;
      }

      scrollBox.style.display = "flex";

      const mainItems = data.filter(item => 
        item.department.toLowerCase().includes("звягель") || 
        item.department.toLowerCase().includes("ємільчин") || 
        item.department.toLowerCase().includes("баранів") || 
        item.department.toLowerCase().includes("житомирський отцк") ||
        item.department.toLowerCase().includes("отцк та сп")
      );

      mainContainer.innerHTML = "";
      mainItems.forEach(item => {
        mainContainer.innerHTML += createRowHtml(item);
      });

      if (currentQuery) {
        document.getElementById("search-bar").value = currentQuery;
      }

      const btn = document.getElementById("toggle-btn");
      if(isSpoilerOpen) {
        otherContainer.classList.add("open");
        btn.innerText = "Сховати інші райони ▴";
      } else {
        otherContainer.classList.remove("open");
        btn.innerText = "Інші підрозділи області ▾";
      }

      filterCards();
    }

    function toggleSpoiler() {
      const content = document.getElementById("other-cards");
      const btn = document.getElementById("toggle-btn");
      isSpoilerOpen = !isSpoilerOpen;
      
      if(isSpoilerOpen) {
        content.classList.add("open");
        btn.innerText = "Сховати інші райони ▴";
      } else {
        content.classList.remove("open");
        btn.innerText = "Інші підрозділи області ▾";
      }
    }

    function filterCards() {
      const query = document.getElementById("search-bar") ? document.getElementById("search-bar").value.toLowerCase() : "";
      const filteredOtherContainer = document.getElementById("filtered-other-cards");
      if (!filteredOtherContainer) return;
      
      const otherItems = allData.filter(item => 
        !item.department.toLowerCase().includes("звягель") && 
        !item.department.toLowerCase().includes("ємільчин") && 
        !item.department.toLowerCase().includes("баранів") && 
        !item.department.toLowerCase().includes("житомирський отцк") &&
        !item.department.toLowerCase().includes("отцк та сп")
      );

      filteredOtherContainer.innerHTML = "";
      const filtered = otherItems.filter(item => item.department.toLowerCase().includes(query));
      
      if(filtered.length === 0) {
        filteredOtherContainer.innerHTML = '<div style="text-align:center; font-size:11px; padding:5px;">Нічого не знайдено.</div>';
        return;
      }

      filtered.forEach(item => {
        filteredOtherContainer.innerHTML += createRowHtml(item);
      });
    }

    function showError(err) {
      document.getElementById("loader").style.display = "none";
      document.getElementById('refresh-clock').innerText = "Помилка синхронізації.";
    }
  </script>
</body>
</html>
